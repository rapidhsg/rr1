<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="300">
<title>Rapid Roofing — Quarterly Thermometer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   RAPID ROOFING QUARTERLY THERMOMETER
   Parameterized — swap the DATA block below each quarter.
   Refreshes 2x/week. Designed for 1920x1080 office TV display.
   ============================================================ */

:root {
  --bg: #0a0a0a;
  --bg-tile: #141414;
  --bg-tile-elev: #1c1c1c;
  --text: #ffffff;
  --text-dim: #888888;
  --text-faint: #4a4a4a;
  --rapid-red: #CC0000;
  --flashpoint-yellow: #F4B800;
  --status-green: #A3E635;
  --status-lime: #65A30D;
  --status-yellow: #F4B800;
  --status-red: #CC0000;
  --border-subtle: #262626;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Oswald', sans-serif;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Subtle grain texture for depth on TV */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' /%3E%3C/svg%3E");
}

.dashboard {
  width: 100vw;
  height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto;
  padding: 1.5vw 1.8vw 1.1vw;
  gap: 1.3vw;
  position: relative;
  z-index: 2;
}

/* ============ TOP STRIP ============ */
.top-strip {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 2vw;
  padding: 0.5vw 1.5vw;
  background: linear-gradient(90deg, var(--rapid-red) 0%, #8a0000 100%);
  border-radius: 4px;
  position: relative;
  overflow: hidden;
}

.top-strip::after {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 12px,
    rgba(255,255,255,0.03) 12px,
    rgba(255,255,255,0.03) 24px
  );
  pointer-events: none;
}

.brand {
  display: flex;
  align-items: center;
  height: 100%;
}

.brand img {
  height: 5.5vw;
  width: auto;
  display: block;
  mix-blend-mode: screen;
}

.quarter-meta {
  display: flex;
  justify-content: center;
  gap: 2.5vw;
  font-family: 'Oswald', sans-serif;
  font-weight: 500;
  font-size: 1.3vw;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.quarter-meta .label {
  color: rgba(255,255,255,0.6);
  font-size: 0.85vw;
  display: block;
  margin-bottom: 0.2vw;
  letter-spacing: 0.15em;
}

.quarter-meta .value {
  font-family: 'Anton', sans-serif;
  font-size: 1.8vw;
  letter-spacing: 0.02em;
}

.quarter-meta .item {
  text-align: center;
}

.quarter-label {
  font-family: 'Anton', sans-serif;
  font-size: 2.4vw;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* ============ TILE GRID ============ */
.grid {
  display: grid;
  grid-template-rows: 1.1fr 1fr;
  gap: 1.3vw;
  min-height: 0;
}

.row-headline {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1.3vw;
  min-height: 0;
}

.row-funnel {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.3vw;
  min-height: 0;
}

/* ============ TILE ============ */
.tile {
  background: var(--bg-tile);
  border-radius: 6px;
  padding: 1.3vw 1.5vw;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 0.35vw;
  border: 2px solid var(--border-subtle);
  min-height: 0;
}

.tile .progress-wrap {
  margin-top: auto;
}

.tile::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 5px;
  background: var(--status-color, var(--text-dim));
}

.tile.status-green { --status-color: var(--status-green); }
.tile.status-lime { --status-color: var(--status-lime); }
.tile.status-yellow { --status-color: var(--status-yellow); }
.tile.status-red { --status-color: var(--status-red); }

.tile.status-red {
  background: linear-gradient(180deg, rgba(204,0,0,0.08) 0%, var(--bg-tile) 60%);
}

.tile.status-green {
  background: radial-gradient(ellipse at center top, rgba(163,230,53,0.22) 0%, var(--bg-tile) 70%);
  box-shadow: 0 0 50px rgba(163,230,53,0.30), inset 0 0 60px rgba(163,230,53,0.07);
}

.tile.status-lime {
  background: radial-gradient(ellipse at center top, rgba(101,163,13,0.12) 0%, var(--bg-tile) 70%);
  box-shadow: 0 0 25px rgba(101,163,13,0.15), inset 0 0 50px rgba(101,163,13,0.03);
}

.tile-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.tile-label {
  font-family: 'Oswald', sans-serif;
  font-weight: 600;
  font-size: 1.1vw;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-dim);
}

.tile-status-badge {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 0.85vw;
  padding: 0.3vw 0.6vw;
  border-radius: 3px;
  background: var(--status-color);
  color: #000;
  letter-spacing: 0.05em;
}

.tile.status-red .tile-status-badge {
  color: #fff;
}

.tile-actual {
  font-family: 'Anton', sans-serif;
  font-size: 4.2vw;
  line-height: 0.95;
  letter-spacing: 0.01em;
  color: var(--text);
  text-shadow: 0 2px 0 rgba(0,0,0,0.3);
}

.row-funnel .tile-actual {
  font-size: 3.4vw;
}

.tile-actual .prefix {
  font-size: 0.55em;
  vertical-align: top;
  color: var(--text-dim);
  margin-right: 0.1em;
}

.tile-insight {
  font-family: 'Oswald', sans-serif;
  font-size: 1vw;
  font-weight: 400;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-top: 0.8vw;
  line-height: 1.5;
}

.tile-insight > span {
  margin-right: 0.45vw;
}

.tile-insight > span:last-child {
  margin-right: 0;
}

.tile-insight .insight-verb {
  color: var(--text);
  font-weight: 500;
}

.tile-insight .insight-amount {
  color: var(--flashpoint-yellow);
  font-weight: 500;
  font-family: 'Oswald', sans-serif;
  font-size: 1.3vw;
  letter-spacing: 0.04em;
}

.tile-insight .insight-deadline {
  color: var(--text-faint);
  font-weight: 400;
}

.tile-insight.ahead .insight-amount {
  color: var(--status-green);
}

.tile-days-left {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72vw;
  font-weight: 500;
  color: var(--text-faint);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 0.4vw;
}

/* ============ PROGRESS BAR ============ */
.progress-wrap {
  position: relative;
  height: 0.9vw;
  background: #2a2a2a;
  border-radius: 2px;
  overflow: visible;
  margin-top: 0.3vw;
}

.progress-fill {
  height: 100%;
  background: var(--status-color, var(--text));
  border-radius: 2px;
  transition: width 0.4s ease;
  position: relative;
}

.pace-marker {
  position: absolute;
  top: -0.3vw;
  bottom: -0.3vw;
  width: 3px;
  background: var(--flashpoint-yellow);
  transform: translateX(-50%);
  z-index: 2;
}

.pace-marker::after {
  content: "PACE";
  position: absolute;
  top: -1.1vw;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 0.6vw;
  color: var(--flashpoint-yellow);
  letter-spacing: 0.1em;
  white-space: nowrap;
}

/* ============ TILE FOOTER ============ */
.tile-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85vw;
  margin-top: 0.4vw;
}

.delta {
  font-weight: 700;
  letter-spacing: 0.02em;
}

.delta.behind { color: var(--rapid-red); }
.delta.ahead { color: var(--status-green); }

.goal-display {
  color: var(--text-dim);
  font-weight: 500;
}

.goal-display .goal-num {
  color: var(--text);
  font-weight: 700;
}

/* ============ BOTTOM BAR ============ */
.bottom-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.4vw 0.5vw;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75vw;
  color: var(--text-faint);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.bottom-bar .left,
.bottom-bar .right {
  display: flex;
  gap: 1.5vw;
}

.bottom-bar .stat {
  display: flex;
  gap: 0.4vw;
}

.bottom-bar .stat-val {
  color: var(--text-dim);
}

/* ============ ANIMATIONS ============ */
@keyframes pulse-red {
  0%, 100% { box-shadow: 0 0 0 0 rgba(204, 0, 0, 0); }
  50% { box-shadow: 0 0 0 4px rgba(204, 0, 0, 0.15); }
}

.tile.status-red {
  animation: pulse-red 3s ease-in-out infinite;
}

@keyframes slide-in {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.tile {
  animation: slide-in 0.5s ease-out backwards;
}

.tile:nth-child(1) { animation-delay: 0.0s; }
.tile:nth-child(2) { animation-delay: 0.08s; }
.tile:nth-child(3) { animation-delay: 0.16s; }
.tile:nth-child(4) { animation-delay: 0.24s; }
.tile:nth-child(5) { animation-delay: 0.32s; }
.tile:nth-child(6) { animation-delay: 0.40s; }

</style>
</head>

  <div class="bottom-bar">
    <div class="left">
      <div class="stat"><span>Quarter window</span><span class="stat-val" id="window-display"></span></div>
      <div class="stat"><span>Pace logic</span><span class="stat-val">Straight-line daily</span></div>
    </div>
    <div class="right">
      <div class="stat"><span>Refreshed</span><span class="stat-val" id="refresh-display"></span></div>
      <div class="stat"><span>RHSG</span><span class="stat-val">Long Island, NY</span></div>
    </div>
  </div>

<script>
// ============================================================
// RENDER LOGIC
// ============================================================

function daysBetween(a, b) {
  const ms = new Date(b) - new Date(a);
  return Math.floor(ms / (1000 * 60 * 60 * 24));
}

function fmtCurrency(n) {
  if (n >= 1000000) return "$" + (n / 1000000).toFixed(2) + "M";
  if (n >= 1000) return "$" + Math.round(n / 1000) + "K";
  return "$" + Math.round(n).toLocaleString();
}

function fmtCount(n) {
  return Math.round(n).toLocaleString();
}

function fmt(value, type) {
  return type === "currency" ? fmtCurrency(value) : fmtCount(value);
}

function fmtDelta(value, type) {
  const abs = Math.abs(value);
  if (type === "currency") return fmtCurrency(abs);
  return fmtCount(abs);
}

function statusFor(pct, greenThreshold = 100) {
  if (pct >= 100) return "green";              // full win
  if (pct >= greenThreshold) return "lime";    // near pace (98%+ for count-type)
  if (pct >= 90) return "yellow";
  return "red";
}

function statusLabel(s) {
  if (s === "green") return "ON PACE";
  if (s === "lime")  return "CLOSE";
  if (s === "yellow") return "WATCH";
  return "BEHIND";
}

// Returns the last day of the month for a given UTC date string YYYY-MM-DD
function monthEndUTC(dateStr) {
  const d = new Date(dateStr);
  const y = d.getUTCFullYear();
  const m = d.getUTCMonth();
  // Day 0 of next month = last day of current month
  return new Date(Date.UTC(y, m + 1, 0));
}

// Returns {monthLabel, needed} for the monthly checkpoint
function getMonthlyCheckpoint(metric, refreshDate, quarter) {
  const qStart = new Date(quarter.startDate);
  const qEnd = new Date(quarter.endDate);

  // The monthly target is the LATER of: end of current month, or if we're past it, end of next month
  // But capped at quarter end (since beyond quarter end is irrelevant)
  let target = monthEndUTC(refreshDate);
  // If we're on or after month-end, advance one month
  const today = new Date(refreshDate);
  if (today >= target) {
    const next = new Date(Date.UTC(target.getUTCFullYear(), target.getUTCMonth() + 1, 1));
    target = monthEndUTC(next.toISOString().slice(0, 10));
  }
  // Cap at quarter end
  if (target > qEnd) target = qEnd;

  const totalDays = Math.floor((qEnd - qStart) / 86400000) + 1;
  const daysToTarget = Math.floor((target - qStart) / 86400000) + 1;
  const paceAtTarget = metric.goal * (daysToTarget / totalDays);
  const needed = Math.max(0, paceAtTarget - metric.actual);

  const monthLabel = target.toLocaleDateString("en-US", {month: "short", timeZone: "UTC"}).toUpperCase();
  const monthDay = target.getUTCDate();
  const daysRemaining = Math.max(0, Math.ceil((target - today) / 86400000));
  return { monthLabel, monthDay, needed, daysRemaining };
}

function renderQuarterMeta() {
  const { startDate, endDate, refreshDate } = DATA.quarter;
  const totalDays = daysBetween(startDate, endDate) + 1;
  const daysElapsed = daysBetween(startDate, refreshDate) + 1;
  const daysRemaining = totalDays - daysElapsed;
  const pctThrough = (daysElapsed / totalDays) * 100;
  const weekNum = Math.ceil(daysElapsed / 7);
  const totalWeeks = Math.ceil(totalDays / 7);

  document.getElementById("quarter-meta").innerHTML = `
    <div class="item"><span class="label">Week</span><span class="value">${weekNum} / ${totalWeeks}</span></div>
    <div class="item"><span class="label">Day</span><span class="value">${daysElapsed} / ${totalDays}</span></div>
    <div class="item"><span class="label">Through</span><span class="value">${pctThrough.toFixed(1)}%</span></div>
    <div class="item"><span class="label">Days Left</span><span class="value">${daysRemaining}</span></div>
  `;

  document.getElementById("quarter-label").textContent = DATA.quarter.label;
  document.getElementById("window-display").textContent =
    new Date(startDate).toLocaleDateString("en-US", {month:"short", day:"numeric", timeZone:"UTC"}) +
    " — " +
    new Date(endDate).toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric", timeZone:"UTC"});

  document.getElementById("refresh-display").textContent =
    new Date(refreshDate).toLocaleDateString("en-US", {weekday:"short", month:"short", day:"numeric", timeZone:"UTC"});

  return { totalDays, daysElapsed, pctThrough };
}

function renderTile(m, pctThrough) {
  // ============ COVERAGE-TYPE METRIC (Revenue In Progress) ============
  if (m.isCoverage) {
    // Fixed-threshold mode: m.goal is a constant target (e.g., weekly install target)
    // Dynamic-gap mode: m.coverageFrom references another metric, gap = ref.goal - ref.actual
    const target = m.coverageFrom
      ? Math.max(0, DATA.metrics.find(x => x.key === m.coverageFrom).goal - DATA.metrics.find(x => x.key === m.coverageFrom).actual)
      : m.goal;
    const pctOfTarget = target > 0 ? (m.actual / target) * 100 : 100;
    const shortfall = Math.max(0, target - m.actual);
    const surplus = Math.max(0, m.actual - target);
    const status = statusFor(pctOfTarget, m.greenThreshold || 100);
    const fillPct = Math.min(100, pctOfTarget);

    // Status labels
    const coverageLabel = status === "green" ? "ON PACE"
                       : status === "lime"   ? "CLOSE"
                       : status === "yellow" ? "WATCH"
                       : "LOW";

    // Days remaining in quarter
    const qEnd = new Date(DATA.quarter.endDate);
    const today = new Date(DATA.quarter.refreshDate);
    const qDaysLeft = Math.max(0, Math.ceil((qEnd - today) / 86400000));

    // Insight differs by mode
    let insightInner;
    if (m.coverageFrom) {
      // Dynamic gap (legacy)
      insightInner = `<span class="insight-verb">SELL</span><span class="insight-amount">${fmt(shortfall, m.type)}</span><span class="insight-deadline">TO CLOSE THE GAP</span>`;
    } else {
      // Fixed threshold
      if (m.actual >= target) {
        insightInner = `<span class="insight-amount">${fmt(surplus, m.type)}</span><span class="insight-verb">ABOVE</span><span class="insight-deadline">WEEKLY TARGET</span>`;
      } else {
        insightInner = `<span class="insight-verb">NEED</span><span class="insight-amount">${fmt(shortfall, m.type)}</span><span class="insight-deadline">TO HIT WEEKLY TARGET</span>`;
      }
    }

    return `
      <div class="tile status-${status}">
        <div class="tile-header">
          <div class="tile-label">${m.label}</div>
          <div class="tile-status-badge">${coverageLabel}</div>
        </div>
        <div class="tile-actual">${fmt(m.actual, m.type)}</div>
        <div class="tile-insight${m.actual >= target && !m.coverageFrom ? ' ahead' : ''}">
          ${insightInner}
        </div>
        <div class="tile-days-left">${qDaysLeft} ${qDaysLeft === 1 ? 'DAY' : 'DAYS'} LEFT IN QUARTER</div>
        <div class="progress-wrap">
          <div class="progress-fill" style="width: ${fillPct}%"></div>
        </div>
        <div class="tile-footer">
          <div class="delta ${pctOfTarget >= 100 ? 'ahead' : 'behind'}">
            ${pctOfTarget.toFixed(0)}% OF TARGET
          </div>
          <div class="goal-display">
            TARGET <span class="goal-num">${fmt(target, m.type)}</span>
          </div>
        </div>
      </div>
    `;
  }

  // ============ STANDARD PACE-TYPE METRIC ============
  const pace = m.goal * (pctThrough / 100);
  const pctActualVsGoal = (m.actual / m.goal) * 100;
  const pctActualVsPace = pace > 0 ? (m.actual / pace) * 100 : 0;
  const delta = m.actual - pace;
  const isAhead = delta >= 0;
  const status = statusFor(pctActualVsPace, m.greenThreshold || 100);

  // Progress bar fill % is actual/goal (so the pace marker sits where pace/goal % is)
  const fillPct = Math.min(100, pctActualVsGoal);
  const pacePct = Math.min(100, pctThrough);

  // Monthly checkpoint
  const monthly = getMonthlyCheckpoint(m, DATA.quarter.refreshDate, DATA.quarter);
  const isMonthAhead = monthly.needed <= 0;
  const insightLine = isMonthAhead
    ? `<span class="insight-amount">${fmt(Math.abs(monthly.needed), m.type)}</span><span class="insight-verb">AHEAD OF</span><span class="insight-deadline">${monthly.monthLabel} ${monthly.monthDay} PACE</span>`
    : `<span class="insight-verb">${m.verb}</span><span class="insight-amount">${fmt(monthly.needed, m.type)}</span><span class="insight-verb">MORE BY</span><span class="insight-deadline">${monthly.monthLabel} ${monthly.monthDay}</span>`;

  return `
    <div class="tile status-${status}">
      <div class="tile-header">
        <div class="tile-label">${m.label}</div>
        <div class="tile-status-badge">${statusLabel(status)}</div>
      </div>
      <div class="tile-actual">${fmt(m.actual, m.type)}</div>
      <div class="tile-insight ${isMonthAhead ? 'ahead' : ''}">
        ${insightLine}
      </div>
      <div class="tile-days-left">${monthly.daysRemaining} ${monthly.daysRemaining === 1 ? 'DAY' : 'DAYS'} LEFT IN ${monthly.monthLabel}</div>
      <div class="progress-wrap">
        <div class="progress-fill" style="width: ${fillPct}%"></div>
        <div class="pace-marker" style="left: ${pacePct}%"></div>
      </div>
      <div class="tile-footer">
        <div class="delta ${isAhead ? 'ahead' : 'behind'}">
          ${fmtDelta(delta, m.type)} ${isAhead ? '▲ AHEAD' : '▼ BEHIND'}
        </div>
        <div class="goal-display">
          GOAL <span class="goal-num">${fmt(m.goal, m.type)}</span>
        </div>
      </div>
    </div>
  `;
}

function render() {
  const { pctThrough } = renderQuarterMeta();

  const headline = DATA.metrics.filter(m => m.tier === "headline");
  const funnel = DATA.metrics.filter(m => m.tier === "funnel");

  document.getElementById("row-headline").innerHTML =
    headline.map(m => renderTile(m, pctThrough)).join("");
  document.getElementById("row-funnel").innerHTML =
    funnel.map(m => renderTile(m, pctThrough)).join("");
}

render();
</script>
